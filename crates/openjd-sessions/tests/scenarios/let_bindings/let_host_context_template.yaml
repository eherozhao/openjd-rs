specificationVersion: jobtemplate-2023-09
name: Let Bindings Host Context Symbols
extensions:
  - EXPR
  - FEATURE_BUNDLE_1
parameterDefinitions:
  - name: OutputDir
    type: PATH
    default: "/renders"
steps:
  - name: ScriptLetWithSession
    parameterSpace:
      taskParameterDefinitions:
        - name: Frame
          type: INT
          range: "1-2"
    stepEnvironments:
      - name: Setup
        script:
          let:
            - env_work = Session.WorkingDirectory / 'env_output'
          actions:
            onEnter:
              command: bash
              args:
                - "-c"
                - |
                  p='{{env_work}}'
                  case "$p" in *env_output) echo "ENV_WORK_OK=true" ;; *) echo "bad env_work: $p"; exit 1 ;; esac
    script:
      let:
        - work_out = Session.WorkingDirectory / 'output'
        - frame_path = Param.OutputDir / string(Task.Param.Frame)
      actions:
        onRun:
          command: bash
          args:
            - "-c"
            - |
              w='{{work_out}}'
              case "$w" in *output) echo "WORK_OUT_OK=true" ;; *) echo "bad work_out: $w"; exit 1 ;; esac
              echo "FRAME_PATH={{frame_path}}"

  - name: SimpleActionLetWithSession
    bash:
      let:
        - sa_work = Session.WorkingDirectory / 'simple'
      script: |
        echo "SA_WORK_ENDS=$(echo {{repr_sh(sa_work)}} | grep -c 'simple')"
