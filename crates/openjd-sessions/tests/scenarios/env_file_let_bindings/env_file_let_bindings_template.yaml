specificationVersion: jobtemplate-2023-09
name: Env File Let Bindings Test
extensions:
  - EXPR
parameterDefinitions:
  - name: Greeting
    type: STRING
    default: "hello"
jobEnvironments:
  - name: TestEnv
    script:
      embeddedFiles:
        - name: config
          type: TEXT
          data: "greeting={{Param.Greeting}}"
      let:
        - "cfg = Env.File.config"
        - "cfg_has_parent = len(string(cfg.parent)) > 0"
      actions:
        onEnter:
          command: bash
          args:
            - "-c"
            - |
              path='{{ cfg }}'
              if [ -f "$path" ]; then
                echo "env_file_exists=True"
                echo "env_file_content=$(cat "$path")"
              else
                echo "env_file_exists=False"
              fi
              echo "env_file_has_parent={{ cfg_has_parent }}"
        onExit:
          command: bash
          args:
            - "-c"
            - "echo 'env_exit=ok'"
steps:
  - name: Step1
    script:
      actions:
        onRun:
          command: bash
          args:
            - "-c"
            - "echo 'task_ran=ok'"
